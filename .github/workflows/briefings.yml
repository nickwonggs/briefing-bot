name: Scheduled Briefings

# Fires briefings from GitHub Actions instead of Railway, so they run even
# when Railway is asleep or blocked by the peak-hour deploy gate.
#
# Only the morning briefing runs here: 08:00 SGT lands during Railway's forced
# overnight downtime (it can't wake before ~1pm SGT without hitting the LA
# peak-hour redeploy block). Evening/loyalty/gym still run on the Railway
# daemon, which is up at those times.
#
# Cron is UTC. 00:00 UTC = 08:00 SGT.

on:
  schedule:
    - cron: '0 0 * * *'   # 08:00 SGT — morning briefing
  workflow_dispatch:
    inputs:
      briefing:
        description: 'Which briefing to send'
        type: choice
        options: [morning, evening, loyalty]
        default: morning

jobs:
  briefing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install -r requirements.txt
      - name: Send briefing
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
          GOOGLE_TOKEN_JSON_PERSONAL: ${{ secrets.GOOGLE_TOKEN_JSON_PERSONAL }}
        run: |
          BRIEFING="${{ github.event.inputs.briefing }}"
          python run_briefing.py "${BRIEFING:-morning}"
