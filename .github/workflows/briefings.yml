name: Scheduled Briefings

# Only the morning briefing (08:00 SGT) runs here — Railway is asleep at that
# hour so it can't fire it itself. Loyalty, evening, and gym all run inside
# scheduler_daemon.py on Railway, which is reliably awake by 11:00 SGT and
# fires at exact times (unlike GitHub Actions crons, which queue and run late).
#
# GitHub Actions crons are UTC. SGT = UTC+8.
# The morning cron fires at 22:30 UTC (06:30 SGT target) so the typical
# 1–1.5h queue delay lands near 08:00 SGT.

on:
  schedule:
    - cron: '30 22 * * *'  # target 08:00 SGT (fires 06:30 SGT, +1–1.5h delay)
  workflow_dispatch:
    inputs:
      briefing:
        description: 'Which briefing to send'
        type: choice
        options: [morning, evening, loyalty, gym]
        default: morning

jobs:
  briefing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install -r requirements.txt
      - name: Send briefing
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
          GOOGLE_TOKEN_JSON_PERSONAL: ${{ secrets.GOOGLE_TOKEN_JSON_PERSONAL }}
        run: |
          # Scheduled runs are always morning. Manual dispatch can fire any briefing.
          case "${{ github.event.schedule }}" in
            "30 22 * * *") BRIEFING=morning ;;
            *)             BRIEFING="${{ github.event.inputs.briefing }}" ;;
          esac
          python run_briefing.py "${BRIEFING:-morning}"
