name: Restart Bot right after peak ends

# Wakes Railway by redeploying. MUST run outside the Railway free-tier
# peak-hour deploy block (8 AM – 8 PM America/Los_Angeles).
# Peak window in UTC: 15:00–03:00 (PDT) / 16:00–04:00 (PST).
# Peak ENDS at 03:00 UTC (PDT, summer) / 04:00 UTC (PST, winter).
# Fire at peak-end so the bot wakes ASAP instead of waiting until 13:00 SGT.

on:
  schedule:
    # GitHub scheduled crons are best-effort: under load they get delayed hours
    # or dropped with no retry. A single cron is a single point of failure.
    # Fire several slots from peak-end onward — redeploy is idempotent, so the
    # first one that lands off-peak wins and the rest are harmless blips.
    # 03:00 UTC is inside peak during PST, so the 04:00+ slots cover winter.
    - cron: '0 3 * * *'    # 11:00 SGT — peak end (PDT), first wake
    - cron: '30 3 * * *'   # 11:30 SGT
    - cron: '0 4 * * *'    # 12:00 SGT — peak end (PST)
    - cron: '30 4 * * *'   # 12:30 SGT
    - cron: '0 5 * * *'    # 13:00 SGT — backstop
  workflow_dispatch:       # allow manual trigger from GitHub UI

jobs:
  restart:
    runs-on: ubuntu-latest
    steps:
      - name: Redeploy Railway service
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          SERVICE_ID: ${{ secrets.RAILWAY_SERVICE_ID }}
          ENVIRONMENT_ID: ${{ secrets.RAILWAY_ENVIRONMENT_ID }}
        run: |
          set -euo pipefail

          query="{\"query\":\"mutation { serviceInstanceRedeploy(serviceId: \\\"$SERVICE_ID\\\", environmentId: \\\"$ENVIRONMENT_ID\\\") }\"}"

          # Railway has two token types that authenticate via different headers:
          #   - account/team token  -> Authorization: Bearer <token>
          #   - project token       -> Project-Access-Token: <token>
          # Try the account-token header first, then fall back to the project
          # header, so a token-type mix-up doesn't silently break the wake-up.
          for header in "Authorization: Bearer $RAILWAY_TOKEN" "Project-Access-Token: $RAILWAY_TOKEN"; do
            scheme="${header%%:*}"
            echo "Attempting redeploy with $scheme header..."
            resp=$(curl -s -X POST https://backboard.railway.app/graphql/v2 \
              -H "$header" \
              -H "Content-Type: application/json" \
              -d "$query")
            echo "Response: $resp"

            if echo "$resp" | grep -q '"errors"'; then
              echo "::warning::Redeploy failed with $scheme header"
              continue
            fi
            echo "Redeploy accepted ($scheme)."
            exit 0
          done

          echo "::error::Railway redeploy was Not Authorized with every token type."
          echo "::error::Regenerate RAILWAY_TOKEN (Account Settings -> Tokens) and update the GitHub secret."
          exit 1

