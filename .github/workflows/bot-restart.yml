name: Restart Bot at 1pm SGT

# Wakes Railway by redeploying. MUST run outside the Railway free-tier
# peak-hour deploy block (8 AM – 8 PM America/Los_Angeles).
# Peak window in UTC: 15:00–03:00 (PDT) / 16:00–04:00 (PST).
# 05:00 UTC = 13:00 SGT is off-peak year-round.
# The old 00:00 UTC schedule = 5 PM LA = inside peak → redeploy rejected daily,
# which is why the bot stayed asleep.

on:
  schedule:
    # GitHub scheduled crons are best-effort: under load they get delayed hours
    # or dropped with no retry. A single cron is a single point of failure (the
    # bot stayed asleep past 15:00 SGT when the lone 05:00 run never fired).
    # Fire several off-peak slots instead — redeploy is idempotent, so waking an
    # already-up service is a harmless blip. Off-peak UTC (PDT+PST) = 04:00-15:00.
    - cron: '0 5 * * *'    # 13:00 SGT
    - cron: '30 5 * * *'   # 13:30 SGT
    - cron: '0 6 * * *'    # 14:00 SGT
    - cron: '30 6 * * *'   # 14:30 SGT
  workflow_dispatch:       # allow manual trigger from GitHub UI

jobs:
  restart:
    runs-on: ubuntu-latest
    steps:
      - name: Redeploy Railway service
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          SERVICE_ID: ${{ secrets.RAILWAY_SERVICE_ID }}
          ENVIRONMENT_ID: ${{ secrets.RAILWAY_ENVIRONMENT_ID }}
        run: |
          curl -sf -X POST https://backboard.railway.app/graphql/v2 \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"query\":\"mutation { serviceInstanceRedeploy(serviceId: \\\"$SERVICE_ID\\\", environmentId: \\\"$ENVIRONMENT_ID\\\") }\"}" \
            | tee /dev/stderr | grep -v '"errors"' || { echo "Railway API returned errors"; exit 1; }
